name: Metrics

on:
  # Rebuild once a day (00:00 JST) and allow manual runs.
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Work directly on the dedicated `metrics` branch so the rendered SVG
      # never pollutes main's history or the contribution graph — same
      # self-hosting pattern as the snake animation.
      - name: Checkout metrics branch
        uses: actions/checkout@v4
        with:
          ref: metrics

      # metrics sanitizes `body`/root styles out of extras_css, so we let it
      # only render the file and apply the dark theme ourselves afterwards.
      - name: Generate metrics (no commit)
        # Pinned to a commit SHA (v3.34) for reproducible, supply-chain-safe runs.
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: shinagawa-web
          filename: metrics.svg
          output_action: none
          base: header, activity, metadata
          config_timezone: Asia/Tokyo

      # Deterministic dark theme to match the profile (bg #0d1117, purple
      # accents, light text) — not subject to metrics' CSS sanitizer.
      - name: Apply dark theme
        run: |
          python3 - <<'PY'
          f = "metrics.svg"
          s = open(f, encoding="utf-8").read()
          # Full-size dark background as the first child of the root <svg>.
          i = s.index(">") + 1
          s = s[:i] + '<rect x="0" y="0" width="100%" height="100%" fill="#0d1117"/>' + s[i:]
          # Recolor text/headers/footer and empty calendar days for dark bg.
          for a, b in [
              ("color:#777", "color:#c9d1d9"),     # base text
              ("color:#0366d6", "color:#6e48f5"),  # h1/h2/h3 headers
              ("color:#666", "color:#8b949e"),     # footer
              ("fill:#959da5", "fill:#8b949e"),    # field icons
              ('fill="#ebedf0"', 'fill="#161b22"'),# empty calendar cells
          ]:
              s = s.replace(a, b)
          open(f, "w", encoding="utf-8").write(s)
          PY

      - name: Commit rendered SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.svg
          git commit -m "chore: update metrics" || { echo "no changes"; exit 0; }
          git push origin metrics
