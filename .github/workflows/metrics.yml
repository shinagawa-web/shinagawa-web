name: Metrics

on:
  # Rebuild once a day (00:00 JST) and allow manual runs.
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Check out main (clean) — NOT the metrics branch. Checking out metrics
      # brought its already-rendered metrics.svg into the workspace, which
      # shadowed the fresh render and caused the patch to stack on stale output.
      - name: Checkout
        uses: actions/checkout@v4

      # metrics sanitizes `body`/root styles out of extras_css, so we let it
      # only render the file and apply the dark theme ourselves afterwards.
      - name: Render metrics (no commit)
        # Pinned to a commit SHA (v3.34) for reproducible, supply-chain-safe runs.
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: shinagawa-web
          filename: metrics.svg
          output_action: none
          base: header, activity, metadata
          config_timezone: Asia/Tokyo

      - name: Dark theme + publish to metrics branch
        env:
          # With `output_action: none`, metrics writes the fresh render here
          # (NOT the workspace root) — confirmed via the run logs.
          SRC: /metrics_renders/metrics.svg
        run: |
          set -euo pipefail
          test -f "$SRC" || { echo "fresh render not found at $SRC"; find / -name metrics.svg 2>/dev/null | head; exit 1; }

          # Deterministic dark theme (bg #0d1117, purple accents, light text) —
          # not subject to metrics' CSS sanitizer. The assert guards against
          # ever patching an already-themed (stale) file.
          python3 - <<'PY'
          import os
          f = os.environ["SRC"]
          s = open(f, encoding="utf-8").read()
          assert 'fill="#0d1117"' not in s, "metrics.svg is already themed — not a fresh render"
          i = s.index(">") + 1
          s = s[:i] + '<rect x="0" y="0" width="100%" height="100%" fill="#0d1117"/>' + s[i:]
          for a, b in [
              ("color:#777", "color:#c9d1d9"),     # base text
              ("color:#0366d6", "color:#6e48f5"),  # h1/h2/h3 headers
              ("color:#666", "color:#8b949e"),     # footer
              ("fill:#959da5", "fill:#8b949e"),    # field icons
              ('fill="#ebedf0"', 'fill="#161b22"'),# empty calendar cells
          ]:
              s = s.replace(a, b)
          open(f, "w", encoding="utf-8").write(s)
          PY

          # Publish the themed SVG to the dedicated `metrics` branch (kept off
          # main so it never pollutes history or the contribution graph).
          cp "$SRC" /tmp/metrics.svg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin metrics
          git checkout metrics
          cp /tmp/metrics.svg metrics.svg
          git add metrics.svg
          git commit -m "chore: update metrics" || { echo "no changes"; exit 0; }
          git push origin metrics
