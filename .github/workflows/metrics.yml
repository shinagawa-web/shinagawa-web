name: Metrics

on:
  # Rebuild once a day (00:00 JST) and allow manual runs.
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: shinagawa-web
          filename: metrics.svg
          # Commit the rendered SVG to a dedicated branch so it never
          # pollutes main's history or the contribution graph — same
          # self-hosting pattern as the snake animation.
          committer_branch: metrics
          committer_message: "chore: update metrics"
          base: header, activity, repositories, metadata
          config_timezone: Asia/Tokyo
          # Dark theme to match the profile (bg #0d1117, purple accents),
          # otherwise the card is transparent/dark-text = unreadable on
          # GitHub's dark mode.
          extras_css: |
            body { background: #0d1117; color: #c9d1d9; }
            h2, h3 { color: #6E48F5 !important; }
            a, h2 a, h3 a { color: #b392f0 !important; }
            .field svg { fill: #8b949e !important; }
            .day[fill="#ebedf0"] { fill: #161b22 !important; }
